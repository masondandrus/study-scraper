# ============================================================
# Study Tracker Configuration
# ============================================================

# ------------------------------------------------------------
# Search queries by source
# ------------------------------------------------------------

pubmed:
  queries:
    # ── Core research areas ──
    - "\"stress enhanced fear learning\"[Title/Abstract]"
    - "SEFL[Title/Abstract] AND (fear conditioning OR fear learning)"
    - "gene environment interaction[Title/Abstract] AND (addiction OR substance use disorder OR drug self-administration)"
    - "heterogeneous stock rats[Title/Abstract]"
    - "RATTACA[Title/Abstract] OR (\"reduced complexity cross\"[Title/Abstract] AND rat)"

    # ── Fear conditioning & epigenetics (scoped to neuro) ──
    - "fear conditioning[Title/Abstract] AND (prefrontal cortex OR amygdala OR hippocampus) AND rat"
    - "fear conditioning[Title/Abstract] AND (epigenetic OR gene expression) AND brain"
    - "epigenetic[Title/Abstract] AND (fear conditioning OR fear extinction OR fear learning)"
    - "fear extinction[Title/Abstract] AND (prefrontal cortex OR infralimbic OR prelimbic)"

    # ── Addiction neuroscience ──
    - "cue reactivity[Title/Abstract] AND stress AND (genetic OR genomic)"
    - "incubation[Title/Abstract] AND (drug seeking OR cocaine seeking OR heroin seeking)"
    - "adolescent social isolation[Title/Abstract] AND (brain OR behavior OR gene expression)"

    # ── PTSD + SUD comorbidity ──
    - "PTSD[Title/Abstract] AND substance use disorder[Title/Abstract] AND (neurobiology OR neurocircuit OR mechanism)"
    - "fear extinction[Title/Abstract] AND (drug seeking OR relapse OR reinstatement)"
    - "trauma[Title/Abstract] AND (opioid OR cocaine OR ethanol) AND (self-administration OR reinstatement) AND rat"
    - "trauma[Title/Abstract] AND opioid[Title/Abstract] AND (brain OR neurobiology) AND (rat OR mouse OR rodent)"
    - "trauma[Title/Abstract] AND addiction[Title/Abstract] AND (animal model OR preclinical)"

    # ── Methods ──
    - "DeepLabCut[Title/Abstract] AND (fear OR freezing)"

biorxiv:
  collections:
    - neuroscience
    - animal-behavior-and-cognition
  queries:
    - "stress enhanced fear learning"
    - "SEFL fear conditioning"
    - "gene environment addiction self-administration"
    - "heterogeneous stock rats"
    - "RATTACA"
    - "fear conditioning amygdala prefrontal rat"
    - "fear conditioning epigenetic brain"
    - "fear extinction prefrontal infralimbic"
    - "fear extinction drug seeking relapse"
    - "PTSD substance use neurobiology"
    - "incubation drug seeking cocaine"
    - "adolescent social isolation brain behavior"
    - "trauma opioid self-administration reinstatement"
    - "trauma opioid neurobiology rat"

google_scholar:
  # Google Scholar needs VERY specific exact-phrase queries.
  # Broad terms produce massive noise. Less is more here.
  queries:
    - "\"stress-enhanced fear learning\""
    - "\"stress enhanced fear learning\""
    - "\"SEFL\" \"fear conditioning\""
    - "\"heterogeneous stock rats\""
    - "\"RATTACA\" rat"
    - "\"fear conditioning\" \"epigenetic\" brain rodent"
    - "\"fear extinction\" \"drug seeking\" reinstatement"
    - "\"fear extinction\" \"prefrontal cortex\" rat"
    - "PTSD \"substance use disorder\" neurocircuit mechanism"
    - "trauma opioid \"self-administration\" reinstatement rat"
    - "\"incubation\" \"drug seeking\" cocaine"

# ------------------------------------------------------------
# Email settings
# ------------------------------------------------------------
email:
  sender: ""
  recipient: ""
  smtp_server: "smtp.gmail.com"
  smtp_port: 587

# ------------------------------------------------------------
# General settings
# ------------------------------------------------------------
settings:
  days_back: 7
  max_results_per_query: 20
  deduplicate: true
  sort_by: "date"
