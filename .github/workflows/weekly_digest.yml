name: Weekly Literature Digest

on:
  # Run every Monday at 8:00 AM Pacific (15:00 UTC)
  schedule:
    - cron: "0 15 * * 1"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run study tracker
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python study_tracker.py

      - name: Save digest artifact (optional)
        if: always()
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python study_tracker.py --output digest.html --dry-run || true

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest
          path: digest.html
          retention-days: 30
